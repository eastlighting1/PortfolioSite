globalType: profile
name: Donghyeon Kim
headline: AI Systems Engineer connecting data systems, AI-DLC/MLOps, and NLP/LLM research experience
intro: I structure diverse data surfaces, including structured, text, image, and graph data, and connect them to AI systems that can be evaluated, observed, and delivered through the AI-Driven Development Life Cycle.
summary: I am an AI Systems Engineer who connects data work with graph as a core strength, AI-DLC-based MLOps and observability, and NLP/LLM research experience into company-reviewable evidence and artifacts.
philosophy:
  - I turn diverse data surfaces into reviewable structures and pipelines.
  - I make AI experiments and operating workflows reproducible and observable.
  - I connect NLP/LLM research experience to evaluable system decisions.

capabilityGroups:
  - title: Data Science
    description: The ability to refine real-world data for reliable modeling through analysis and preprocessing
    skills:
      - Data Preparation
      - Feature Engineering
      - Data Wrangling
      - Data Manipulation
  - title: Applied AI
    description: The ability to turn domain-specific NLP into concrete tasks through experimentation and implementation
    skills:
      - Conversational AI
      - Medical AI
      - Knowledge Graph
      - Logic-based AI
  - title: MLOps
    description: The ability to build repeatable workflows and scale them through deployment and automation
    skills:
      - Cloud
      - Docker
      - Continuous Training
      - Feature Store
  - title: Observability in AI
    description: An operational perspective for tracing model behavior to improve reproducibility and maintenance
    skills:
      - Logging
      - Monitoring
      - Artifacts
      - Provenance

pipeline:
  - title: Feature Engineering
    emphasis: Data structure and management
    description: I preprocess complex data in ways that fit the task and design pipelines that preserve data quality and consistency.
  - title: Reproducible Experiments
    emphasis: Automating training
    description: I train models under carefully controlled code and environment settings, and track them systematically to build experiments that can be reproduced at any time.
  - title: Robust Evaluation
    emphasis: Validation and assessment
    description: Going beyond simple accuracy, I examine robustness, error cases, and the demands of medical and conversational domains from multiple angles to establish reliability before production use.
  - title: DevOps
    emphasis: Infrastructure and deployment
    description: I deploy models in AWS or Docker environments and support reliable operation in real-world settings through continuous integration and automation.
  - title: System Observability
    emphasis: Monitoring and feedback loops
    description: I collect and visualize logs, resource signals, and prediction outputs from deployed AI systems in real time so that the internal state of the pipeline can be observed transparently.
