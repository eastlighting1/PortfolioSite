globalType: profile
name: Donghyeon Kim
headline: Applied AI researcher and AI engineer focused on deployable conversational AI and medical AI systems
intro: I am interested in applied AI problems grounded in real-world data, and in connecting them to models, evaluation, and deliverables that collaborators can actually use. Recently, I have been working across conversational AI, medical AI, and ML systems with a focus on improving reproducibility and practical delivery.
summary: I am a graduate researcher with experience in NLP, medical AI, deep learning, and end-to-end AI project implementation. I am particularly interested in turning experimental AI work into trustworthy systems through stronger evaluation, clear documentation, and a practical MLOps perspective.
philosophy:
  - I build AI systems that are not only accurate, but also understandable and reusable.
  - I treat evaluation not as an appendix to a paper, but as part of the deliverable itself.
  - I connect experimentation and delivery so that technical work remains useful beyond the person who created it.

capabilityGroups:
  - title: Data Science
    description: The ability to refine the quality and structure of real-world data and build a solid foundation for modeling through analysis and preprocessing
    skills:
      - Data Preparation
      - Feature Engineering
      - Data Wrangling
      - Data Manipulation
  - title: Applied AI
    description: The ability to turn domain-specific NLP problems into concrete tasks and connect them to reviewable outcomes through experimentation and implementation
    skills:
      - Conversational AI
      - Medical AI
      - Knowledge Graph
      - Logic-based AI
  - title: MLOps
    description: The ability to organize development into repeatable, collaborative workflows and scale it into systems with deployment and automation in mind
    skills:
      - Cloud
      - Docker
      - Continuous Training
      - Feature Store
  - title: Observability in AI
    description: An operational perspective centered on recording and tracing model behavior to improve reproducibility, debuggability, and maintainability
    skills:
      - Logging
      - Monitoring
      - Artifacts
      - Provenance

pipeline:
  - title: Feature Engineering
    emphasis: Data structure and management
    description: I preprocess complex data in ways that fit the task and design pipelines that preserve data quality and consistency.
  - title: Reproducible Experiments
    emphasis: Automating training
    description: I train models under carefully controlled code and environment settings, and track them systematically to build experiments that can be reproduced at any time.
  - title: Robust Evaluation
    emphasis: Validation and assessment
    description: Going beyond simple accuracy, I examine robustness, error cases, and the demands of medical and conversational domains from multiple angles to establish reliability before production use.
  - title: DevOps
    emphasis: Infrastructure and deployment
    description: I deploy models in AWS or Docker environments and support reliable operation in real-world settings through continuous integration and automation.
  - title: System Observability
    emphasis: Monitoring and feedback loops
    description: I collect and visualize logs, resource signals, and prediction outputs from deployed AI systems in real time so that the internal state of the pipeline can be observed transparently.