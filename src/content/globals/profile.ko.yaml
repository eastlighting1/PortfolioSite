globalType: profile
name: 김동현
headline: 데이터 시스템, AI-DLC/MLOps, NLP/LLM 연구 경험을 연결하는 AI Systems Engineer
intro: 저는 정형, 텍스트, 이미지, 그래프 데이터를 모델링 가능한 구조로 만들고, AI-Driven Development Life Cycle 관점에서 실험, 평가, 관측, 전달이 이어지는 AI 시스템을 만드는 데 관심이 있습니다.
summary: 그래프를 핵심 강점으로 둔 데이터 처리, AI-DLC 기반 MLOps와 observability, NLP/LLM 연구 경험을 기업 검토 가능한 증거와 산출물로 연결하는 AI Systems Engineer입니다.
philosophy:
  - 다양한 데이터 표면을 검토 가능한 구조와 파이프라인으로 바꾸는 일을 중요하게 생각합니다.
  - AI 실험과 운영 흐름을 재현 가능하고 관측 가능하게 만드는 데 집중합니다.
  - NLP/LLM 연구 경험을 평가 가능한 시스템 판단으로 연결하고자 합니다.

capabilityGroups:
  - title: Data Science
    description: 실제 데이터의 품질과 구조를 다듬고, 분석과 전처리를 통해 모델링 가능한 기반을 만드는 역량
    skills:
      - Data Preparation
      - Feature Engineering
      - Data Wrangling
      - Data Manipulation
  - title: Applied AI
    description: 도메인 NLP 문제를 여러 태스크로 구체화하고, 실험과 구현을 통해 검토 가능한 결과로 연결하는 역량
    skills:
      - Conversational AI
      - Medical AI
      - Knowledge Graph
      - Logic-based AI
  - title: MLOps
    description: 개발 과정을 반복 가능하고 협업 가능한 워크플로로 정리하고, 배포와 자동화를 고려해 시스템으로 확장하는 역량
    skills:
      - Cloud
      - Docker
      - Continuous Training
      - Feature Store
  - title: Observability in AI
    description: 모델의 동작을 기록하고 추적하여 재현성, 디버깅 가능성, 유지보수성을 높이는 운영 관점의 역량
    skills:
      - Logging
      - Monitoring
      - Artifacts
      - Provenance

pipeline:
  - title: 피처 엔지니어링
    emphasis: 데이터의 구성과 관리 
    description: 복잡한 데이터를 목적에 맞게 전처리하고, 데이터의 품질과 일관성을 유지하기 위한 파이프라인을 설계합니다.
  - title: 재현 가능한 실험
    emphasis: 훈련 자동화하기
    description: 코드와 환경을 철저히 통제하여 모델을 학습시키고, 체계적으로 추적하여 언제든 재현 가능한 실험 환경을 구축합니다.
  - title: 강건한 평가
    emphasis: 검증하고 평가하기
    description: 단순한 정확도를 넘어 모델의 강건성, 오류 사례, 그리고 의료 및 대화 도메인의 요구사항을 다각도로 검증하여 프로덕션 도입 전 신뢰성을 확보합니다.
  - title: 데브옵스
    emphasis: 인프라와 배포
    description: AWS 혹은 Docker 환경에서 모델을 배포하고, 지속적인 통합과 자동화를 통해 모델이 실제 환경에서 안정적으로 운영될 수 있도록 합니다.
  - title: 시스템 관측 가능성
    emphasis: 모니터링과 피드백 루프
    description: 배포된 AI 시스템의 로그, 리소스, 예측 결과를 실시간으로 수집하고 시각화하여 파이프라인 내부 상태를 투명하게 관측합니다.
