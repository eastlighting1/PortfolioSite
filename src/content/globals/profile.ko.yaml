globalType: profile
name: 김동현
headline: 데이터 구조화와 NLP/LLM 평가를 시스템 구현으로 연결하는 엔지니어
intro: 정형 데이터, 텍스트, 이미지, 그래프처럼 서로 다른 데이터 형태를 모델이 활용할 수 있는 구조로 정리하고, 실험·평가·배포 과정에서 남는 기술 판단을 구현 결과로 연결하는 데 관심이 있습니다.
summary: 데이터 구조화, AI 개발 흐름, NLP/LLM 평가 경험을 바탕으로 문제 정의부터 구현, 검증, 전달까지 이어지는 작업을 수행합니다.
philosophy:
  - 다양한 데이터 표면을 모델링과 운영에 연결 가능한 구조와 파이프라인으로 바꾸는 일을 중요하게 생각합니다.
  - AI 실험과 운영 흐름을 재현 가능하고 관측 가능하게 만드는 데 집중합니다.
  - NLP/LLM 연구 경험을 평가 가능한 시스템 판단으로 연결하고자 합니다.

capabilityGroups:
  - title: Data Systems
    description: 정형, 텍스트, 이미지, 그래프형 데이터를 모델링과 운영에 이어지는 구조로 만드는 역량
    skills:
      - Data Preparation
      - Graph-native Modeling
      - Data Pipelines
      - Hybrid Representation
  - title: Applied NLP/LLM
    description: NLP/LLM 문제를 모델링, 평가 설계, 적용 맥락 판단으로 구체화하는 역량
    skills:
      - Conversational AI
      - Evaluation Design
      - Knowledge Graph
      - Logic-based AI
  - title: MLOps
    description: 개발 과정을 반복 가능하고 협업 가능한 워크플로로 정리하고, 배포와 자동화를 고려해 시스템으로 확장하는 역량
    skills:
      - Cloud
      - Docker
      - Continuous Training
      - Feature Store
  - title: Observability in AI
    description: 모델의 동작을 기록하고 추적하여 재현성, 디버깅 가능성, 유지보수성을 높이는 운영 관점의 역량
    skills:
      - Logging
      - Monitoring
      - Artifacts
      - Provenance

pipeline:
  - title: 피처 엔지니어링
    emphasis: 데이터의 구성과 관리 
    description: 복잡한 데이터를 목적에 맞게 전처리하고, 데이터의 품질과 일관성을 유지하기 위한 파이프라인을 설계합니다.
  - title: 재현 가능한 실험
    emphasis: 훈련 자동화하기
    description: 코드와 환경을 철저히 통제하여 모델을 학습시키고, 체계적으로 추적하여 언제든 재현 가능한 실험 환경을 구축합니다.
  - title: 강건한 평가
    emphasis: 검증하고 평가하기
    description: 단순한 정확도를 넘어 모델의 강건성, 오류 사례, 적용 맥락의 요구사항을 다각도로 검토하여 실제 사용 전 신뢰성을 확인합니다.
  - title: 데브옵스
    emphasis: 인프라와 배포
    description: AWS 혹은 Docker 환경에서 모델을 배포하고, 지속적인 통합과 자동화를 통해 모델이 실제 환경에서 안정적으로 운영될 수 있도록 합니다.
  - title: 시스템 관측 가능성
    emphasis: 모니터링과 피드백 루프
    description: 배포된 AI 시스템의 로그, 리소스, 예측 결과를 실시간으로 수집하고 시각화하여 파이프라인 내부 상태를 투명하게 관측합니다.
