documentTitle: About | Donghyeon Kim
documentDescription: Gallery-style archive for event notes, personal thoughts, and working memos around applied AI systems.
sectionOrder:
  - hero
  - gallery
hero:
  eyebrow: About
  title: Activity notes and technical perspective
  description: Events, communities, and research notes are searchable by tag and type. Longer writing expands inside the card when needed.
positioning:
  enabled: false
  eyebrow: Page Role
  title: This page is neither a resume nor a project index
  lead: The about page is looser than a formal career summary and more curated than a blog. It shows what I study, which communities I learn from, and how my technical perspective changes over time.
  cards:
    - label: Reading Mode
      title: Context outside the project
      body: Project pages hold deliverables and technical decisions; this page holds the thoughts, events, and notes around them.
    - label: Editing Mode
      title: Add cards without changing code
      body: Add a new archive Markdown file, then tune count and visible types here in YAML.
    - label: Difference from Portfolio
      title: Perspective, not proof
      body: The portfolio shows work outcomes and technical judgment. The about page shows the interests and direction behind that judgment.
gallery:
  enabled: true
  title: Activity Archive
  lead: Filter first, then expand only the notes that matter for the review.
  count: 9
  types:
    - event
    - thought
    - note
  openEntryLabel: Open entry
  closeEntryLabel: Close
