  philosophyTitle: Working Philosophy
  systemsTitle: Why systems thinking matters to me
  systemsBody: My work sits between AI research and implementation. I enjoy building models, but I care just as much about whether results can be evaluated clearly, explained to collaborators, and turned into something other people can actually use. That is why I became increasingly interested in reproducibility, observability, and MLOps-adjacent practices. I do not position myself as a pure platform engineer; rather, I approach these topics as a researcher and builder who wants AI systems to remain trustworthy after the experiment is over.
