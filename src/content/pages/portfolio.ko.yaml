pageType: portfolio
contract:
  userQuestion: "왜 이 Data & Applied AI 프로필을 믿을 수 있는가?"
  pageAnswer: "대표 evidence를 검토자 모드와 역할 렌즈에 따라 재정렬하고 설명한다."
  requiredEvidence:
    - reviewer-mode
    - role-lens-workbench
    - aidlc-stage-map
    - case-comparison
    - research-proof
  nextPaths:
    - label: "프로젝트"
      href: /projects/
      reason: "전체 evidence database를 검색하고 필터링한다."
    - label: "연구"
      href: /research/
      reason: "모델링과 평가 판단의 근거를 확인한다."
  doNotRepeat:
    - "프로젝트 목록을 단순 카드 그리드로 반복하지 않는다."
documentTitle: 포트폴리오 | 김동현
documentDescription: 프로젝트, 연구, 개발 흐름을 함께 검토할 수 있는 Data & Applied AI 포트폴리오입니다.
printToolbarLabel: 인쇄 또는 PDF 저장에 맞춘 Data & Applied AI 포트폴리오입니다.
hero:
  eyebrow: Portfolio for Technical Review
  title: Data & Applied AI Engineer
  lead: 데이터 구조화, AI 개발 흐름, NLP/LLM 평가 경험을 실제 프로젝트와 연구 기록으로 설명합니다.
  valueStatement: 각 작업에서 문제 정의, 설계 판단, 구현 결과, 공개 가능한 산출물을 함께 확인할 수 있습니다.
  actions:
    - label: 대표 케이스 보기
      href: "#featuredCases"
      variant: primary
    - label: 인쇄 / PDF 저장
      href: /portfolio/print/#print
      variant: secondary
    - label: 이력서 열기
      href: /resume/
      variant: secondary
sectionHeadings:
  valueMap:
    eyebrow: Focus Areas
    title: 관심 분야별로 대표 작업을 다시 정렬합니다
    lead: 데이터, AI 개발 흐름, NLP/LLM 관점 중 하나를 선택하면 관련성이 높은 프로젝트가 먼저 보입니다.
  aidlc:
    eyebrow: Development Flow
    title: AI 프로젝트에서 반복해서 다룬 개발 흐름
    lead: 한 프로젝트의 단계별 진행표가 아니라, 여러 프로젝트에서 반복적으로 다뤄온 데이터 준비, 실험, 평가, 배포, 기록 관리의 작업 방식을 요약합니다.
  evidenceLibrary:
    eyebrow: Project Records
    title: 프로젝트 기록
    lead: 각 프로젝트의 제목과 설명은 위쪽에 두고, 데이터 형태와 공개 범위 같은 메타 정보는 별도 영역으로 분리했습니다.
  outcomes:
    eyebrow: 성과
    title: 작업 맥락 안에서만 읽히는 결과
    lead: 절대값 숫자를 독립 카드로 내세우지 않고, 케이스 내부에서 문제와 판단의 결과로만 다룹니다.
  featuredCases:
    eyebrow: Project Comparison
    title: 문제, 결정, 결과가 함께 보이는 대표 작업
    lead: 포트폴리오의 핵심은 프로젝트 목록이 아니라 판단 과정과 결과의 연결입니다.
  process:
    eyebrow: 프로세스
    title: 반복 가능한 작업 방식
    lead: 연구, 실험, 구현, 전달을 어떤 순서로 엮는지 보여줍니다.
  researchBridge:
    eyebrow: Research
    title: 연구 기록
    lead: 연구는 별도 실적 목록이 아니라, 프로젝트에서 사용한 모델링과 평가 판단의 배경으로 연결됩니다.
  recognition:
    eyebrow: 수료와 수상
    title: 학습과 실무 기반을 보강한 이력
    lead: 자격과 수상은 주장이 아니라 프로젝트 근거를 보강하는 보조 신호입니다.
  contact:
    eyebrow: ""
    title: 공식 검토는 이력서로, 기술 검토는 케이스로 이어집니다
    lead: 채용 검토는 이력서, 기술 검토는 프로젝트 케이스, 더 깊은 대화는 연락처로 이어지게 설계했습니다.
