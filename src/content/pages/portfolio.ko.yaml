sectionHeadings:
  valueMap:
    eyebrow: Role Map
    title: 세 개의 역할이 같은 무게로 검토됩니다
    lead: 데이터, AI-DLC/MLOps, NLP/LLM 연구 역량을 서로 보조하는 동등한 직무 신호로 제시합니다.
  aidlc:
    eyebrow: AI-DLC
    title: AI-Driven Development Life Cycle로 작업 흐름을 설명합니다
    lead: 데이터 준비에서 실험, 학습, 평가, 배포, 관측, 복구까지 어떤 구간을 다뤘는지 명확히 보여줍니다.
  evidenceLibrary:
    eyebrow: Evidence
    title: 프로젝트는 역할별 증거로 읽힙니다
    lead: 프로젝트를 단순 목록이 아니라 Evidence Level, Disclosure Level, 데이터 표면, 워크플로우 단계로 분류합니다.
  outcomes:
    eyebrow: 성과
    title: 주요 성과는 맥락과 함께 제시합니다
    lead: 숫자와 키워드는 단독으로 두지 않고, 어떤 프로젝트에서 나온 증거인지 함께 보여줍니다.
  featuredCases:
    eyebrow: 케이스
    title: 문제, 결정, 결과가 함께 보이는 대표 작업
    lead: 포트폴리오의 핵심은 프로젝트 목록이 아니라 판단 과정과 결과의 연결입니다.
  process:
    eyebrow: 프로세스
    title: 반복 가능한 작업 방식
    lead: 연구, 실험, 구현, 전달을 어떤 순서로 엮는지 보여줍니다.
  researchBridge:
    eyebrow: 연구 연결
    title: 연구는 별도 선반이 아니라 구현의 근거입니다
    lead: 연구 페이지가 publication archive라면, 이 섹션은 프로젝트 판단을 뒷받침한 연구 맥락입니다.
  recognition:
    eyebrow: 수료와 수상
    title: 학습과 실무 기반을 보강한 이력
    lead: 자격과 수상은 주장이 아니라 프로젝트 근거를 보강하는 보조 신호입니다.
  contact:
    eyebrow: 연락
    title: 공식 검토는 이력서로, 기술 검토는 케이스로 이어집니다
    lead: 채용 검토는 이력서, 기술 검토는 프로젝트 케이스, 더 깊은 대화는 연락처로 이어지게 설계했습니다.
