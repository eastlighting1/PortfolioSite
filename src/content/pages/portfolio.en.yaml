pageType: portfolio
documentTitle: Portfolio | Donghyeon Kim
documentDescription: A company-submission AI Systems Engineer portfolio organized around data, AI-DLC/MLOps, and NLP/LLM evidence.
printToolbarLabel: A company-submission AI Systems Engineer portfolio organized around data, AI-DLC/MLOps, and NLP/LLM evidence.
hero:
  eyebrow: Company Review Portfolio
  title: AI Systems Engineer
  lead: I connect structured, text, image, and graph data with AI-DLC operations and NLP/LLM research experience into company-reviewable evidence.
  valueStatement: The portfolio is designed to read as an AI systems engineering profile, not a domain-only research archive.
  actions:
    - label: View Featured Cases
      href: "#featuredCases"
      variant: primary
    - label: Save as PDF
      href: /portfolio/print/
      variant: secondary
    - label: Open Resume
      href: /resume/
      variant: secondary
sectionHeadings:
  valueMap:
    eyebrow: Role Map
    title: Three role themes carry equal review weight
    lead: Data, AI-DLC/MLOps, and NLP/LLM research are presented as equal signals that reinforce one AI systems profile.
  aidlc:
    eyebrow: AI-DLC
    title: AI-Driven Development Life Cycle as the operating model
    lead: The portfolio makes it clear which stages are covered from data and experiment through training, evaluation, deployment, observability, and recovery.
  evidenceLibrary:
    eyebrow: Evidence
    title: Projects are organized as role-based evidence
    lead: Projects are classified by evidence level, disclosure level, data surface, and workflow stage rather than shown as a flat list.
  outcomes:
    eyebrow: Outcomes
    title: Outcomes stay close to their evidence
    lead: Metrics and keywords appear with the project context that produced them.
  featuredCases:
    eyebrow: Cases
    title: Featured work framed by problem, decision, and outcome
    lead: The portfolio is not a project list; it is a map of judgment, tradeoffs, and results.
  process:
    eyebrow: Process
    title: A repeatable way of turning research into systems
    lead: This section shows how research, experimentation, implementation, and delivery connect.
  researchBridge:
    eyebrow: Research
    title: Research is evidence that feeds implementation
    lead: The research page is a publication archive; this section shows the research context behind project decisions.
  recognition:
    eyebrow: Recognition
    title: Learning and practice signals behind the work
    lead: Certificates and awards support the evidence rather than replacing it.
  contact:
    eyebrow: Contact
    title: Use the resume for formal review and the cases for technical depth
    lead: The page is designed to move from formal review to technical inspection to direct conversation.
