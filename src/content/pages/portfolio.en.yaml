pageType: portfolio
contract:
  userQuestion: "Why should this Data & Applied AI profile be trusted?"
  pageAnswer: "Reorder and explain representative evidence by reviewer mode and role lens."
  requiredEvidence:
    - reviewer-mode
    - role-lens-workbench
    - aidlc-stage-map
    - case-comparison
    - research-proof
  nextPaths:
    - label: "Projects"
      href: /projects/
      reason: "Search and filter the full evidence database."
    - label: "Research"
      href: /research/
      reason: "Inspect modeling and evaluation judgment."
  doNotRepeat:
    - "Do not reduce portfolio to a prettier project grid."
documentTitle: Portfolio | Donghyeon Kim
documentDescription: A Data & Applied AI portfolio for reviewing projects, research, and implementation judgment.
printToolbarLabel: Data & Applied AI portfolio optimized for print or PDF export.
hero:
  eyebrow: Portfolio for Technical Review
  title: Data & Applied AI Engineer
  lead: Projects and research records across data structure, AI development workflows, and NLP/LLM evaluation.
  valueStatement: Each project is framed by its problem, design decision, implementation result, and available artifacts.
  actions:
    - label: View Featured Cases
      href: "#featuredCases"
      variant: primary
    - label: Print / Save PDF
      href: /portfolio/print/#print
      variant: secondary
    - label: Open Resume
      href: /resume/
      variant: secondary
sectionHeadings:
  valueMap:
    eyebrow: Focus Areas
    title: Reorder representative work by focus area
    lead: Choose data, AI workflow, or NLP/LLM to bring the most relevant projects forward.
  aidlc:
    eyebrow: Development Flow
    title: Recurring development flow across AI projects
    lead: This summarizes recurring work patterns across projects, not a click-by-click stage diagram for one project.
  evidenceLibrary:
    eyebrow: Project Records
    title: Project records
    lead: Project title and explanation stay separate from metadata such as data surfaces and availability.
  outcomes:
    eyebrow: Outcomes
    title: Results only inside their work context
    lead: Absolute metrics are not promoted as standalone cards; they are kept inside the relevant case when they explain a decision.
  featuredCases:
    eyebrow: Project Comparison
    title: Featured work framed by problem, decision, and outcome
    lead: The portfolio is not a project list; it is a map of judgment, tradeoffs, and results.
  process:
    eyebrow: Process
    title: A repeatable way of turning research into systems
    lead: This section shows how research, experimentation, implementation, and delivery connect.
  researchBridge:
    eyebrow: Research
    title: Research records
    lead: Research is connected as modeling and evaluation background behind project decisions.
  recognition:
    eyebrow: Recognition
    title: Learning and practice signals behind the work
    lead: Certificates and awards support the work record rather than replacing it.
  contact:
    eyebrow: ""
    title: Use the resume for formal review and the cases for technical depth
    lead: The page is designed to move from formal review to technical inspection to direct conversation.
