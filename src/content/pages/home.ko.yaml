hero:
  enabled: true
  eyebrow: AI 연구자 · MLOps 엔지니어
  summary: 연구 결과를 실제 시스템으로 연결하는 응용 AI 연구자입니다. 대화형 AI, 의료 AI, 그리고 MLOps 관점에서 문제 정의부터 구현과 운영까지 이어지는 작업을 수행합니다.
  actions:
    - label: 핵심 프로젝트
      href: /projects/
      variant: primary
    - label: 이력서 보기
      href: /resume/
      variant: secondary
    - label: 연구 살펴보기
      href: /research/
      variant: secondary
  focusCard:
    label: 현재 집중 영역
    title: 연구와 엔지니어링의 교차점
    body: 정확도 높은 모델 자체보다도 재현 가능한 실험, 관측 가능한 시스템, 그리고 실제 운영까지 이어지는 구조를 중요하게 봅니다. 실험으로 끝나지 않는 AI를 만드는 데 집중합니다.
    items:
      - label: 핵심 도메인
        value: Medical AI (NLP), MLOps
      - label: 연구 관심사
        value: 대화형 AI, 의료 AI, 시스템 관점의 AI
      - label: 핵심 가치
        value: 코드 재현성, 시스템 관측 가능성, 자동화
pipeline:
  enabled: false
  eyebrow: ML 라이프사이클
  title: 데이터 엔지니어링부터 모델 서빙까지
  lead: 복잡한 비정형 데이터의 전처리부터 PyTorch 기반의 모델 학습, 그리고 평가와 <br />실제 배포 환경을 고려한 아키텍처 설계까지 전체 흐름을 주도합니다.
featuredProjects:
  enabled: true
  eyebrow: 프로젝트
  title: 실제 데이터와 요구사항을 해결한 응용 AI 시스템
  lead: 가장 대표적인 프로젝트만 추려 문제 맥락, 역할, 결과가 빠르게 보이도록 정리했습니다.
  count: 2
