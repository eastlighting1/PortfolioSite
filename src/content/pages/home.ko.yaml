    body: 단순히 정확도 높은 모델을 연구하는 것을 넘어 재현 가능한 환경, 관측 가능한 시스템, 그리고 효율적인 인프라를 함께 고민합니다. 실제 비즈니스에서 '작동하는 AI'를 만듭니다.
    items:
      - label: Core Domain
        value: Medical AI (NLP), MLOps
      - label: Research Interests
        value: 대화형 AI, 의료 AI, 시스템 관점의 AI
      - label: Key Values
        value: 코드 재현성, 시스템 관측 가능성, 자동화
