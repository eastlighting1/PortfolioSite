hero:
  enabled: true
  eyebrow: AI Researcher & MLOps Engineer
  summary: 연구에서 프로덕션까지 다양한 환경을 이끌 수 있는 AI 연구자입니다. 대화형 AI부터 의료 데이터에 이르기까지 다양한 응용 분야에서 연구와 구현을 연결합니다.
