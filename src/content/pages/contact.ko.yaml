pageType: contact
contract:
  userQuestion: "무엇을 열거나 보내면 다음 검토가 쉬운가?"
  pageAnswer: "검토 목적별 자료 경로와 연락 채널을 함께 제시한다."
  requiredEvidence:
    - contact-intents
    - channels
    - response-expectation
    - review-paths
  nextPaths:
    - label: "이력서"
      href: /resume/
      reason: "빠른 선별을 위한 공식 기록을 연다."
    - label: "포트폴리오"
      href: /portfolio/
      reason: "기술 검토를 위한 대표 evidence를 연다."
  doNotRepeat:
    - "이메일 주소만 나열하는 페이지가 되지 않는다."
documentTitle: 연락처 | 김동현
documentDescription: 역할 검토, 기술 검토, 구현 확인, 후속 대화를 위한 연락 경로입니다.
sectionOrder:
  - hero
  - links
  - intents
  - response
hero:
  eyebrow: 연락처
  title: 검토 목적에 맞는 다음 경로
  description: 빠른 선별은 이력서로, 기술 검토는 포트폴리오와 프로젝트로, 구체적인 제안은 이메일로 이어지게 정리했습니다.
intents:
  enabled: true
  eyebrow: 대화 주제
  title: 어떤 검토를 이어갈지 선택하기
  lead: 목적에 맞는 자료를 먼저 열고, 필요한 경우 바로 연락할 수 있습니다.
  cards:
    - title: 채용 및 역할 제안
      body: 역할 적합성과 공식 이력을 빠르게 확인하려면 이력서에서 시작하는 것이 가장 좋습니다.
      ctaLabel: 이력서와 함께 검토하기
      href: /resume/
    - title: 연구 및 기술 협업
      body: 연구 주제와 구현 판단의 연결을 확인하려면 연구 페이지와 연결된 프로젝트를 함께 보면 좋습니다.
      ctaLabel: 연구 보기
      href: /research/
    - title: 포트폴리오 및 프로젝트 대화
      body: 기술 결정, 시스템 구조, 산출물 확인이 필요하다면 포트폴리오와 프로젝트 상세가 가장 빠릅니다.
      ctaLabel: 포트폴리오 보기
      href: /portfolio/
response:
  enabled: true
  title: 가장 빠른 연락 방법은 이메일입니다
  body: GitHub, LinkedIn, Google Scholar에서도 작업 맥락을 확인할 수 있지만, 구체적인 제안이나 협업 논의는 이메일이 가장 안정적입니다.
cards:
  title: 연락 채널
  lead: 첫 화면에서 실제 연락처를 바로 확인할 수 있도록 이메일과 공개 프로필을 먼저 배치합니다.
  emailLabel: Email
  externalValueMode: href
