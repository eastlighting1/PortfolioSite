pageType: contact
documentTitle: 연락처 | 김동현
documentDescription: 연구와 응용 AI에 대한 대화를 환영합니다. 포트폴리오 리뷰, AI 엔지니어링 기회, 연구 협업, 대화형 AI와 의료 AI, ML 시스템에 대한 대화에 열려 있습니다.
sectionOrder:
  - hero
  - intents
  - links
  - response
hero:
  eyebrow: 연락처
  title: 바로 연락할 수 있는 채널
  description: 이메일을 가장 우선으로 두고, GitHub, LinkedIn, Google Scholar에서 작업 맥락을 빠르게 확인할 수 있게 정리했습니다.
intents:
  enabled: true
  eyebrow: 대화 주제
  title: 어떤 이유로 연락하면 좋은가
  lead: 연락처 페이지는 링크 모음이 아니라, 어떤 대화를 시작할 수 있는지 빠르게 판단하는 곳입니다.
  cards:
    - title: 채용 및 역할 제안
      body: 데이터 시스템, AI-DLC/MLOps, NLP/LLM 연구 경험을 기업 환경의 AI 시스템으로 연결하는 역할에 대한 대화를 환영합니다.
      ctaLabel: 이력서와 함께 검토하기
      href: /resume/
    - title: 연구 및 기술 협업
      body: NLP/LLM 평가, alignment, 그래프 기반 데이터 시스템, 재현 가능한 AI 운영 흐름에 대한 협업 제안을 열어두고 있습니다.
      ctaLabel: 연구 보기
      href: /research/
    - title: 포트폴리오 및 프로젝트 대화
      body: 프로젝트 구조, 사례 정리 방식, 기술 선택에 대한 피드백이나 대화도 편하게 보낼 수 있습니다.
      ctaLabel: 포트폴리오 보기
      href: /portfolio/
response:
  enabled: true
  title: 가장 빠른 연락 방법은 이메일입니다
  body: GitHub, LinkedIn, Google Scholar에서도 작업 맥락을 확인할 수 있지만, 구체적인 제안이나 협업 논의는 이메일이 가장 안정적입니다.
cards:
  title: 연락 채널
  lead: 첫 화면에서 실제 연락처를 바로 확인할 수 있도록 이메일과 공개 프로필을 먼저 배치합니다.
  emailLabel: Email
  externalValueMode: href
