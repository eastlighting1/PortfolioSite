pageType: about
contract:
  userQuestion: "프로젝트 바깥의 맥락은 무엇인가?"
  pageAnswer: "행사, 메모, 관점 변화를 아카이브로 보관해 학습 경로를 보여준다."
  requiredEvidence:
    - context-positioning
    - archive-gallery
    - activity-notes
  nextPaths:
    - label: "홈"
      href: /
      reason: "검토 경로로 돌아간다."
    - label: "포트폴리오"
      href: /portfolio/
      reason: "핵심 evidence를 본다."
  doNotRepeat:
    - "이력서나 프로젝트 목록과 경쟁하지 않는다."
documentTitle: 소개 | 김동현
documentDescription: 행사 후기, 작업 메모, 그리고 AI 시스템에 대한 생각을 카드 형태로 정리하는 갤러리형 아카이브입니다.
sectionOrder:
  - hero
  - gallery
hero:
  eyebrow: 소개
  title: 활동과 관점을 빠르게 훑어보는 기록
  description: 행사, 커뮤니티, 연구 메모를 태그와 검색으로 탐색할 수 있게 정리했습니다.
positioning:
  enabled: false
  eyebrow: 페이지 역할
  title: 이 페이지는 이력서도, 프로젝트 목록도 아닙니다
  lead: 소개 페이지는 공식 경력 요약보다 느슨하고, 블로그보다 선별된 기록을 보여주는 공간입니다. 내가 무엇을 공부하고, 어떤 커뮤니티와 사건을 통해 관점이 바뀌었는지를 추적합니다.
  cards:
    - label: 읽는 방식
      title: 프로젝트 바깥의 맥락
      body: 프로젝트 페이지에는 결과물을 두고, 이곳에는 그 결과물을 만들기 전후의 생각, 행사, 메모를 둡니다.
    - label: 운영 방식
      title: 카드만 추가해도 흐름이 유지됨
      body: 새 글은 archive Markdown 파일로 추가하고, 이 YAML에서 노출 개수와 유형만 조정하면 됩니다.
    - label: 포트폴리오와 차이
      title: 결과보다 관점
      body: 포트폴리오는 작업 결과와 기술 판단을 보여주고, 소개 페이지는 그 판단을 만든 관심사와 방향성을 보여줍니다.
gallery:
  enabled: true
  title: 활동 아카이브
  lead: 먼저 태그와 유형으로 좁히고, 필요한 글만 펼쳐서 읽을 수 있습니다.
  count: 9
  types:
    - event
    - thought
    - note
  openEntryLabel: 글 보기
  closeEntryLabel: 닫기
